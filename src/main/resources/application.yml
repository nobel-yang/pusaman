server:
  port: ${SERVER_PORT}
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  ai:
    vectorstore:
      milvus:
        client:
          host: ${MILVUS_ID}
          port: 19530
          username: ${MILVUS_USERNAME}
          password: ${MILVUS_PASSWORD}
        database-name: default
        collection-name: test
        initialize-schema: true
        embedding-dimension: 1024
    zhipuai:
      api-key: ${ZHIPU_APPKEY}
      base-url: https://open.bigmodel.cn/api/paas
      chat.options:
        model: ${ZHIPU_MODEL_CHAT}
        response-format: json_object
      embedding.options.model: ${ZHIPU_MODEL_EMBEDDING}

pusaman:
  cache:
    file-path: data
